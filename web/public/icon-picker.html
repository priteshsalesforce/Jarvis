<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jarvis — Choose your icon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "SF Pro", system-ui, -apple-system, sans-serif;
    background: #0D0B1A;
    color: rgba(255,255,255,0.9);
    min-height: 100vh;
    padding: 48px 32px 80px;
  }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
  .sub { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 48px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    border-radius: 20px;
    padding: 28px 20px 22px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.08);
    cursor: pointer;
    transition: all .2s cubic-bezier(.16,1,.3,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    user-select: none;
  }
  .card:hover {
    border-color: rgba(117,38,227,0.6);
    background: rgba(117,38,227,0.1);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(117,38,227,0.25);
  }
  .card.selected {
    border-color: #7526E3;
    background: rgba(117,38,227,0.15);
    box-shadow: 0 0 0 3px rgba(117,38,227,0.25), 0 8px 40px rgba(117,38,227,0.35);
  }
  .card.selected::after {
    content: "✓ Selected";
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9050E9;
    background: rgba(117,38,227,0.15);
    padding: 3px 8px;
    border-radius: 99px;
  }
  .num {
    position: absolute;
    top: 12px;
    left: 14px;
    font-size: 10px;
    font-weight: 800;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
  }
  .icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #7526E3, #9050E9);
    box-shadow: 0 4px 24px rgba(117,38,227,0.4);
  }
  .card:hover .icon-wrap {
    box-shadow: 0 8px 36px rgba(117,38,227,0.6);
  }
  .card svg { display: block; }
  .name { font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.9); }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.45);
  }
  .desc { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.5; }

  .footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding: 20px 24px;
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .footer p { font-size: 13px; color: rgba(255,255,255,0.5); }
  .footer strong { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>

<div style="max-width:1100px; margin:0 auto 0;">
  <h1>Choose Jarvis's icon</h1>
  <p class="sub">Click an option to select it, then tell Jarvis the number or name.</p>

  <div class="grid" id="grid"></div>

  <div class="footer">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(144,80,233,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
    </svg>
    <p>Pick an icon, then tell Jarvis: <strong>"Use option 3"</strong> (or the name). It will be applied everywhere — top bar, rail, login screen, welcome screen, chat panel, and all Neural Core states.</p>
  </div>
</div>

<script>
const icons = [
  {
    num: 1,
    name: "Sparkles",
    desc: "Magical intelligence that delights",
    tags: ["Premium", "Magical", "Delightful"],
    svg: `<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>`,
  },
  {
    num: 2,
    name: "Bot",
    desc: "Classic AI companion — instantly understood",
    tags: ["Friendly", "AI", "Clear"],
    svg: `<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>`,
  },
  {
    num: 3,
    name: "Atom",
    desc: "Orbital intelligence — science-grade power",
    tags: ["Futuristic", "Scientific", "Orbiting"],
    svg: `<circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z"/><path d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5Z"/>`,
  },
  {
    num: 4,
    name: "CPU",
    desc: "The computational core — processing power made visible",
    tags: ["Technical", "Core", "Processing"],
    svg: `<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/>`,
  },
  {
    num: 5,
    name: "Wand",
    desc: "The assistant who makes things happen with a wave",
    tags: ["Magical", "Assistant", "Helpful"],
    svg: `<path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/>`,
  },
  {
    num: 6,
    name: "Zap",
    desc: "Instant action — fast and energetic intelligence",
    tags: ["Fast", "Energetic", "Action"],
    svg: `<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>`,
  },
  {
    num: 7,
    name: "Scan",
    desc: "Always watching, always analysing — calm and precise",
    tags: ["Analytical", "Observing", "Precise"],
    svg: `<path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect width="10" height="8" x="7" y="8" rx="1"/>`,
  },
  {
    num: 8,
    name: "Orbit",
    desc: "Always in motion, always in orbit around your work",
    tags: ["Cosmic", "Orbital", "Motion"],
    svg: `<ellipse cx="12" cy="12" rx="3" ry="3"/><circle cx="12" cy="12" r="3"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>`,
  },
  {
    num: 9,
    name: "Layers",
    desc: "Multi-dimensional intelligence — context on every layer",
    tags: ["Depth", "Context", "Layered"],
    svg: `<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>`,
  },
  {
    num: 10,
    name: "Network",
    desc: "A connected mind — everything linked, nothing missed",
    tags: ["Connected", "Graph", "Intelligence"],
    svg: `<rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/>`,
  },
  {
    num: 11,
    name: "Hexagon",
    desc: "Geometric precision — structured, architectural intelligence",
    tags: ["Geometric", "Precise", "Modern"],
    svg: `<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>`,
  },
  {
    num: 12,
    name: "Eye",
    desc: "Watchful and perceptive — nothing escapes Jarvis",
    tags: ["Perceptive", "Watchful", "Aware"],
    svg: `<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>`,
  },
]

const grid = document.getElementById('grid')
let selected = null

icons.forEach(icon => {
  const card = document.createElement('div')
  card.className = 'card'
  card.id = `card-${icon.num}`
  card.innerHTML = `
    <span class="num">${String(icon.num).padStart(2,'0')}</span>
    <div class="icon-wrap">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
        stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        ${icon.svg}
      </svg>
    </div>
    <div class="name">${icon.name}</div>
    <p class="desc">${icon.desc}</p>
    <div class="tags">${icon.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  `
  card.addEventListener('click', () => {
    if (selected) document.getElementById(`card-${selected}`)?.classList.remove('selected')
    selected = icon.num
    card.classList.add('selected')
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
  })
  grid.appendChild(card)
})
</script>
</body>
</html>
